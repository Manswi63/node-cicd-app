version: 0.2

phases:
  build:
    commands:
      - echo "$PRIVATE_KEY_B64" | base64 -d > key.pem
      - chmod 400 key.pem
      - ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@13.201.84.15 "
    cd node-cicd-app &&
    git pull &&
    npm install &&
    pkill node || true &&
    nohup node app.js > output.log 2>&1 &
  "
  
